name: Orbit Gauntlet

on:
  push:
    branches: [main, release/**]
  pull_request:
  workflow_dispatch:
    inputs:
      plugin_path:
        description: 'Path to plugin (relative to repo root)'
        default: '.'
        required: true

jobs:
  # ── Fast checks — run on every PR ──
  static:
    name: Static analysis
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['7.4', '8.1', '8.3']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer, phpcs, phpstan
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install WP-CLI
        run: |
          curl -O https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          chmod +x wp-cli.phar && sudo mv wp-cli.phar /usr/local/bin/wp

      - name: Zip hygiene + supply chain + forbidden functions
        run: bash scripts/check-zip-hygiene.sh "${{ inputs.plugin_path || '.' }}"

      - name: Plugin header completeness
        run: bash scripts/check-plugin-header.sh "${{ inputs.plugin_path || '.' }}"

      - name: readme.txt validation
        run: bash scripts/check-readme-txt.sh "${{ inputs.plugin_path || '.' }}" || true

      - name: Version parity
        run: bash scripts/check-version-parity.sh "${{ inputs.plugin_path || '.' }}" || true

      - name: License compliance
        run: bash scripts/check-license.sh "${{ inputs.plugin_path || '.' }}" || true

      - name: block.json schema
        run: bash scripts/check-block-json.sh "${{ inputs.plugin_path || '.' }}" || true

      - name: GDPR hooks
        run: bash scripts/check-gdpr-hooks.sh "${{ inputs.plugin_path || '.' }}" || true

      - name: HPOS declaration (WooCommerce)
        run: bash scripts/check-hpos-declaration.sh "${{ inputs.plugin_path || '.' }}" || true

  # ── E2E — runs on push to main / release branches only ──
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: static
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium firefox webkit
      - run: npx wp-env start
      - run: bash scripts/gauntlet.sh --plugin "${{ inputs.plugin_path || '.' }}" --mode full --env ci
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: orbit-reports
          path: reports/
          retention-days: 14
